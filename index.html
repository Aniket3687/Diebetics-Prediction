<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .container-box {
            background: white;
            padding: 40px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #b36b00;
            text-align: center;
        }
        .btn-custom {
            background-color: #d88c1a;
            color: white;
            width: 100%;
        }
        .btn-custom:hover {
            background-color: #b36b00;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box">
        <h1>Diabetes Prediction</h1>
        <p class="text-center">Predict the probability of having Diabetes</p>

        <form action="/predict" method="post">
            <div class="row">
            

                <div class="col-md-4 mb-3">
                    <label>Glucose</label>
                    <input type="number" name="glucose" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Blood Pressure</label>
                    <input type="number" name="bloodpressure" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Skin Thickness</label>
                    <input type="number" name="skinthickness" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Insulin</label>
                    <input type="number" name="insulin" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>BMI</label>
                    <input type="text" name="bmi" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Diabetes Pedigree Function</label>
                    <input type="text" name="dpf" class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-custom mt-3">PREDICT PROBABILITY</button>
        </form>

        {% if prediction_text %}
            <h4 class="text-center mt-4">{{ prediction_text }}</h4>
        {% endif %}
    </div>
</div>

</body>
</html>
